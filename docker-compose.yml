version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: subrecon
      POSTGRES_PASSWORD: subrecon_password_123
      POSTGRES_DB: subrecon_pro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subrecon"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://subrecon:subrecon_password_123@postgres:5432/subrecon_pro"
      JWT_SECRET: "dev-secret-key-change-in-production"
      NODE_ENV: "development"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
    depends_on:
      - backend
    volumes:
      - ./client/src:/app/src

volumes:
  postgres_data:
